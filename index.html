<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form Submitter Pro - Advanced Admin System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; overflow-x: hidden; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
        .progress-line-animate { transition: width 1s linear; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAJokuedwtzo5OIVawlT_AqJgFoZzE89ls",
            authDomain: "aotoform.firebaseapp.com",
            databaseURL: "https://aotoform-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aotoform",
            storageBucket: "aotoform.firebasestorage.app",
            messagingSenderId: "94056136341",
            appId: "1:94056136341:web:e2da62785217129070a59c",
            measurementId: "G-SP8WCBMH6V"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "aotoform-main-app";

        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const MAIN_ADMIN_USER = "Admin";
        const MAIN_ADMIN_PASS = "Admin123456";

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUserData, setCurrentUserData] = useState(null);
            const [loginUser, setLoginUser] = useState('');
            const [loginPass, setLoginPass] = useState('');
            
            const [projects, setProjects] = useState([]); 
            const [tasks, setTasks] = useState([]);
            const [allAdmins, setAllAdmins] = useState([]);
            const [appSettings, setAppSettings] = useState({ logoUrl: '' });
            
            const [activeProjectId, setActiveProjectId] = useState(null);
            const [isAddingProject, setIsAddingProject] = useState(false);
            const [isAdminPanelOpen, setIsAdminPanelOpen] = useState(false);
            const [inputUrl, setInputUrl] = useState('');
            const [inputHtml, setInputHtml] = useState('');
            const [taskName, setTaskName] = useState('');
            const [fieldValues, setFieldValues] = useState({});
            const [scheduleDate, setScheduleDate] = useState(new Date().toISOString().split('T')[0]);
            const [scheduleTime, setScheduleTime] = useState('00:00:00');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [selectedTask, setSelectedTask] = useState(null);

            const [newAdminForm, setNewAdminForm] = useState({
                username: '',
                password: '',
                permissions: { canManageProjects: true, canManageTasks: true, canViewDetails: true }
            });

            // Update Favicon logic
            useEffect(() => {
                if (appSettings.logoUrl) {
                    let link = document.querySelector("link[rel*='icon']");
                    if (!link) {
                        link = document.createElement('link');
                        link.rel = 'shortcut icon';
                        document.getElementsByTagName('head')[0].appendChild(link);
                    }
                    link.href = appSettings.logoUrl;
                }
            }, [appSettings.logoUrl]);

            useEffect(() => {
                auth.signInAnonymously().catch(console.error);
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                // App Settings Sync (Logo, etc.)
                const unsubSettings = publicDataRef.onSnapshot(snap => {
                    if (snap.exists) {
                        setAppSettings(prev => ({ ...prev, ...snap.data().settings }));
                    }
                });

                if (!isLoggedIn) return () => unsubSettings();

                const unsubAdmins = publicDataRef.collection('admins').onSnapshot(snap => {
                    const admins = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllAdmins(admins);
                    if (currentUserData && currentUserData.role !== 'main') {
                        const updatedSelf = admins.find(a => a.username === currentUserData.username);
                        if (updatedSelf && updatedSelf.status === 'blocked') {
                            alert('บัญชีของคุณถูกระงับการใช้งาน');
                            handleLogout();
                        }
                    }
                });

                const unsubProjects = publicDataRef.collection('projects').onSnapshot(snap => {
                    setProjects(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubTasks = publicDataRef.collection('tasks').onSnapshot(snap => {
                    setTasks(snap.docs.map(doc => ({ 
                        id: doc.id, ...doc.data(),
                        targetTime: doc.data().targetTime?.toDate(),
                        createdAt: doc.data().createdAt?.toDate()
                    })));
                });

                return () => { unsubSettings(); unsubAdmins(); unsubProjects(); unsubTasks(); };
            }, [user, isLoggedIn, currentUserData]);

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now);
                    tasks.forEach(task => {
                        if (task.status === 'pending' && now >= task.targetTime) submitTask(task);
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [tasks]);

            const handleLogin = async (e) => {
                if(e) e.preventDefault();
                if (loginUser === MAIN_ADMIN_USER && loginPass === MAIN_ADMIN_PASS) {
                    setCurrentUserData({
                        username: MAIN_ADMIN_USER,
                        role: 'main',
                        permissions: { canManageProjects: true, canManageTasks: true, canViewDetails: true },
                        status: 'active'
                    });
                    setIsLoggedIn(true);
                    return;
                }

                const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const adminSnap = await publicDataRef.collection('admins')
                    .where('username', '==', loginUser)
                    .where('password', '==', loginPass)
                    .get();

                if (!adminSnap.empty) {
                    const data = adminSnap.docs[0].data();
                    if (data.status === 'blocked') return alert('บัญชีนี้ถูกระงับการใช้งาน');
                    setCurrentUserData({ id: adminSnap.docs[0].id, ...data, role: 'sub' });
                    setIsLoggedIn(true);
                } else {
                    alert('Username หรือ Password ไม่ถูกต้อง');
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUserData(null);
                setLoginUser(''); setLoginPass('');
            };

            const updateLogo = async (url) => {
                if (currentUserData.role !== 'main') return;
                const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                await publicDataRef.set({ settings: { logoUrl: url } }, { merge: true });
            };

            const addSubAdmin = async (e) => {
                if(e) e.preventDefault();
                if (!newAdminForm.username || !newAdminForm.password) return;
                const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                await publicDataRef.collection('admins').add({
                    ...newAdminForm,
                    status: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setNewAdminForm({ username: '', password: '', permissions: { canManageProjects: true, canManageTasks: true, canViewDetails: true }});
            };

            const handleAddProject = async (e) => {
                if(e) e.preventDefault();
                if (!currentUserData.permissions.canManageProjects) return;
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(inputHtml, 'text/html');
                    const scriptWithData = Array.from(doc.querySelectorAll('script')).find(s => s.innerText.includes('FB_PUBLIC_LOAD_DATA_'));
                    if (!scriptWithData) throw new Error('ไม่พบข้อมูลฟอร์ม');
                    const regex = /FB_PUBLIC_LOAD_DATA_ = (.*?);/s;
                    const data = JSON.parse(scriptWithData.innerText.match(regex)[1]);
                    const formTitle = data[1][8] || "ฟอร์มไม่มีชื่อ";
                    const fields = data[1][1].map(item => {
                        const label = item[1];
                        const entryIdSuffix = item[4]?.[0]?.[0];
                        const options = item[4]?.[0]?.[1]?.map(opt => opt[0]) || [];
                        if (!entryIdSuffix) return null;
                        return { label, entryId: `entry.${entryIdSuffix}`, options: options.length > 0 ? options : null };
                    }).filter(f => f !== null);

                    const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                    const newDoc = await publicDataRef.collection('projects').add({
                        title: formTitle, url: inputUrl, fields, createdBy: currentUserData.username
                    });
                    setActiveProjectId(newDoc.id);
                    setIsAddingProject(false);
                    setInputHtml(''); setInputUrl('');
                } catch (err) { alert(err.message); }
            };

            const addTaskToQueue = async (e) => {
                if(e) e.preventDefault();
                if (!activeProjectId || !currentUserData.permissions.canManageTasks) return;
                const activeProject = projects.find(p => p.id === activeProjectId);
                const target = new Date(`${scheduleDate}T${scheduleTime}`);
                if (isNaN(target.getTime())) return alert('วันเวลาไม่ถูกต้อง');
                const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                await publicDataRef.collection('tasks').add({
                    projectId: activeProjectId,
                    projectTitle: activeProject.title,
                    taskName: taskName || 'รายการใหม่',
                    data: fieldValues,
                    createdAt: firebase.firestore.Timestamp.fromDate(new Date()),
                    targetTime: firebase.firestore.Timestamp.fromDate(target),
                    status: 'pending',
                    url: activeProject.url,
                    createdBy: currentUserData.username
                });
                setTaskName('');
            };

            const submitTask = async (task) => {
                const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const taskRef = publicDataRef.collection('tasks').doc(task.id);
                await taskRef.update({ status: 'sending' });
                const responseUrl = task.url.replace('/viewform', '/formResponse');
                const formBody = new URLSearchParams();
                Object.entries(task.data).forEach(([key, val]) => formBody.append(key, val));
                try {
                    await fetch(responseUrl, { 
                        method: 'POST', mode: 'no-cors', 
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formBody.toString() 
                    });
                    await taskRef.update({ status: 'success' });
                } catch (err) { await taskRef.update({ status: 'error' }); }
            };

            const getCountdown = (targetDate) => {
                const diff = targetDate - currentTime;
                if (diff <= 0) return "00:00:00";
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                return `${h}:${m}:${s}`;
            };

            const activeProject = useMemo(() => projects.find(p => p.id === activeProjectId), [projects, activeProjectId]);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 p-6 relative overflow-hidden">
                        <div className="absolute inset-0 opacity-20 pointer-events-none">
                            <div className="absolute top-0 left-0 w-96 h-96 bg-indigo-600 rounded-full blur-[150px]"></div>
                            <div className="absolute bottom-0 right-0 w-96 h-96 bg-purple-600 rounded-full blur-[150px]"></div>
                        </div>
                        <form onSubmit={handleLogin} className="w-full max-w-md p-10 glass-panel rounded-[48px] shadow-2xl relative z-10 animate-in zoom-in-95 duration-500 text-center">
                            <div className="mb-10">
                                {appSettings.logoUrl ? (
                                    <img src={appSettings.logoUrl} className="w-24 h-24 mx-auto mb-6 object-contain rounded-3xl" alt="Logo" />
                                ) : (
                                    <div className="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl rotate-3">
                                        <Icon name="shield-check" className="text-white w-10 h-10" />
                                    </div>
                                )}
                                <h1 className="text-3xl font-black text-slate-800">Admin Login</h1>
                                <p className="text-slate-400 text-sm mt-2 font-medium">ยืนยันตัวตนเพื่อเข้าถึงระบบคิว</p>
                            </div>
                            <div className="space-y-4">
                                <input type="text" value={loginUser} onChange={e => setLoginUser(e.target.value)} placeholder="Username" className="w-full px-5 py-4 bg-slate-100 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold" required />
                                <input type="password" value={loginPass} onChange={e => setLoginPass(e.target.value)} placeholder="Password" className="w-full px-5 py-4 bg-slate-100 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-100 font-bold" required />
                                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95">เข้าสู่ระบบ</button>
                            </div>
                        </form>
                    </div>
                );
            }

            return (
                <div className="min-h-screen px-4 pb-20">
                    <div className="max-w-6xl mx-auto pt-8">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                            <div className="flex items-center gap-5">
                                {appSettings.logoUrl ? (
                                    <img src={appSettings.logoUrl} className="w-16 h-16 object-contain rounded-2xl shadow-lg" alt="Logo" />
                                ) : (
                                    <div className="p-4 bg-indigo-600 rounded-3xl shadow-xl shadow-indigo-100">
                                        <Icon name="zap" className="text-white w-6 h-6" />
                                    </div>
                                )}
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800">Aotoform <span className="text-indigo-600">Cloud</span></h1>
                                    <div className="flex items-center gap-2 mt-1">
                                        <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold uppercase tracking-widest ${currentUserData.role === 'main' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-600'}`}>
                                            {currentUserData.role === 'main' ? 'Main Admin' : 'Sub Admin'}
                                        </span>
                                        <span className="text-[10px] font-mono text-slate-400 font-bold">{currentTime.toLocaleTimeString('th-TH')}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                {currentUserData.role === 'main' && (
                                    <button onClick={() => setIsAdminPanelOpen(true)} className="bg-white border border-slate-200 text-slate-600 px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-50 transition-all shadow-sm">
                                        <Icon name="users" /> จัดการทีม
                                    </button>
                                )}
                                {currentUserData.permissions.canManageProjects && (
                                    <button onClick={() => setIsAddingProject(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg active:scale-95 transition-all">
                                        <Icon name="plus" /> เพิ่มโปรเจกต์
                                    </button>
                                )}
                                <button onClick={handleLogout} className="p-2.5 bg-white text-red-500 rounded-xl hover:bg-red-50 transition-all border border-red-100">
                                    <Icon name="power" className="w-6 h-6" />
                                </button>
                            </div>
                        </div>

                        <div className="grid lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-3 space-y-3">
                                <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Projects List</h3>
                                {projects.map(p => (
                                    <div key={p.id} className="relative group">
                                        <button onClick={() => setActiveProjectId(p.id)} className={`w-full text-left p-4 rounded-2xl transition-all border flex items-center justify-between ${activeProjectId === p.id ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl' : 'bg-white border-slate-100 text-slate-600 hover:border-indigo-200'}`}>
                                            <span className="font-bold truncate pr-6">{p.title}</span>
                                            <Icon name="chevron-right" className={`w-4 h-4 transition-all ${activeProjectId === p.id ? 'opacity-100' : 'opacity-0'}`} />
                                        </button>
                                        {currentUserData.permissions.canManageProjects && (
                                            <button onClick={() => {if(confirm('ลบ?')) db.collection('artifacts').doc(appId).collection('public').doc('data').collection('projects').doc(p.id).delete()}} className="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-red-400 opacity-0 group-hover:opacity-100 hover:bg-red-50 rounded-lg transition-all">
                                                <Icon name="trash-2" className="w-4 h-4" />
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <div className="lg:col-span-9 space-y-8 animate-in slide-in-from-bottom-4 duration-500">
                                {activeProject ? (
                                    <div className="grid md:grid-cols-2 gap-8">
                                        <form onSubmit={addTaskToQueue} className="bg-white rounded-[40px] shadow-xl border border-slate-100 p-8 space-y-6">
                                            <h2 className="font-black text-xl flex items-center gap-3 border-b pb-4"><Icon name="edit-3" className="text-indigo-600"/> สร้างคิวส่ง</h2>
                                            <div className="space-y-4">
                                                <input type="text" value={taskName} onChange={e => setTaskName(e.target.value)} placeholder="ชื่อเรียก (เช่น จองให้คุณหญิง)..." className="w-full px-5 py-3.5 bg-slate-50 border-none rounded-2xl outline-none focus:ring-4 focus:ring-indigo-50 font-bold" />
                                                <div className="grid grid-cols-2 gap-3">
                                                    <input type="date" value={scheduleDate} onChange={e => setScheduleDate(e.target.value)} className="w-full px-3 py-3 bg-slate-50 border-none rounded-2xl outline-none font-bold" />
                                                    <input type="time" step="1" value={scheduleTime} onChange={e => setScheduleTime(e.target.value)} className="w-full px-3 py-3 bg-slate-50 border-none rounded-2xl outline-none font-bold" />
                                                </div>
                                                <div className="pt-4 space-y-4 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                                                    {activeProject.fields.map((f, i) => (
                                                        <div key={i} className="space-y-1">
                                                            <label className="text-[11px] font-bold text-slate-600 block">{f.label}</label>
                                                            {f.options ? (
                                                                <select value={fieldValues[f.entryId] || ''} onChange={e => setFieldValues({...fieldValues, [f.entryId]: e.target.value})} className="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-2xl outline-none font-bold">
                                                                    <option value="">เลือกคำตอบ</option>
                                                                    {f.options.map((opt, oi) => <option key={oi} value={opt}>{opt}</option>)}
                                                                </select>
                                                            ) : (
                                                                <input type="text" value={fieldValues[f.entryId] || ''} onChange={e => setFieldValues({...fieldValues, [f.entryId]: e.target.value})} className="w-full px-5 py-3.5 bg-slate-50 border-none rounded-2xl outline-none focus:bg-white font-bold" />
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <button type="submit" disabled={!currentUserData.permissions.canManageTasks} className="w-full bg-indigo-600 disabled:bg-slate-200 disabled:text-slate-400 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">เพิ่มรายการเข้าคิว</button>
                                        </form>

                                        <div className="space-y-4">
                                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest px-2">History & Monitoring</h3>
                                            <div className="space-y-4 max-h-[750px] overflow-y-auto pr-2 custom-scrollbar">
                                                {tasks.filter(t => t.projectId === activeProjectId)
                                                    .sort((a,b) => b.targetTime - a.targetTime)
                                                    .map(task => {
                                                        const diff = task.targetTime - currentTime;
                                                        const progress = task.status === 'pending' ? Math.min(100, Math.max(0, (1 - diff / (task.targetTime - task.createdAt)) * 100)) : 100;
                                                        return (
                                                            <div key={task.id} className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden group hover:shadow-xl transition-all cursor-pointer" onClick={() => currentUserData.permissions.canViewDetails && setSelectedTask(task)}>
                                                                <div className="p-5 flex items-center justify-between">
                                                                    <div className="flex items-center gap-4">
                                                                        <div className={`w-10 h-10 rounded-2xl flex items-center justify-center ${task.status === 'success' ? 'bg-green-100 text-green-600' : task.status === 'error' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600'}`}>
                                                                            <Icon name={task.status === 'pending' ? 'timer' : 'check-circle'} className="w-6 h-6" />
                                                                        </div>
                                                                        <div>
                                                                            <div className="font-bold text-slate-700 text-sm truncate max-w-[130px]">{task.taskName}</div>
                                                                            {task.status === 'pending' && <div className="text-[10px] text-indigo-600 font-black animate-pulse">ส่งใน {getCountdown(task.targetTime)}</div>}
                                                                        </div>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <div className="text-[9px] text-slate-400 font-mono text-right leading-tight">{task.targetTime.toLocaleDateString()}<br/>{task.targetTime.toLocaleTimeString()}</div>
                                                                        <button onClick={(e) => { e.stopPropagation(); db.collection('artifacts').doc(appId).collection('public').doc('data').collection('tasks').doc(task.id).delete() }} className="p-2 text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                                    </div>
                                                                </div>
                                                                <div className="h-1.5 w-full bg-slate-50"><div className="h-full progress-line-animate" style={{ width: `${progress}%`, backgroundColor: task.status === 'success' ? '#10b981' : '#6366f1' }}></div></div>
                                                            </div>
                                                        );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-[48px] border-4 border-dashed border-slate-100 p-32 text-center text-slate-300">
                                        <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <Icon name="mouse-pointer-2" className="w-10 h-10 opacity-20" />
                                        </div>
                                        <p className="font-black uppercase tracking-widest">เลือกโปรเจกต์จากด้านซ้าย</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Admin Panel Modal */}
                    {isAdminPanelOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in fade-in">
                            <div className="bg-white w-full max-w-2xl rounded-[40px] shadow-2xl p-10 space-y-8">
                                <div className="flex justify-between items-center border-b pb-6">
                                    <h2 className="text-2xl font-black flex items-center gap-3"><Icon name="users" className="text-indigo-600" /> จัดการทีม Admin</h2>
                                    <button onClick={() => setIsAdminPanelOpen(false)} className="p-2 hover:bg-slate-50 rounded-full"><Icon name="x" /></button>
                                </div>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="space-y-4">
                                        <div className="p-4 bg-slate-50 rounded-3xl space-y-3">
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">ตั้งค่า Branding</h4>
                                            <div className="flex gap-2">
                                                <input type="text" value={appSettings.logoUrl} onChange={e => setAppSettings({...appSettings, logoUrl: e.target.value})} placeholder="URL โลโก้ (Favicon)" className="flex-1 px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs outline-none" />
                                                <button onClick={() => updateLogo(appSettings.logoUrl)} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold">บันทึก</button>
                                            </div>
                                        </div>
                                        <form onSubmit={addSubAdmin} className="space-y-4 bg-slate-50 p-6 rounded-3xl">
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">เพิ่มสมาชิกใหม่</h4>
                                            <input type="text" value={newAdminForm.username} onChange={e => setNewAdminForm({...newAdminForm, username: e.target.value})} placeholder="Username" className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none font-bold" required />
                                            <input type="text" value={newAdminForm.password} onChange={e => setNewAdminForm({...newAdminForm, password: e.target.value})} placeholder="Password" className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none font-bold" required />
                                            <button type="submit" className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-700 shadow-xl transition-all">บันทึกแอดมิน</button>
                                        </form>
                                    </div>
                                    <div className="space-y-3 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                                        {allAdmins.map(admin => (
                                            <div key={admin.id} className={`p-4 rounded-2xl border flex items-center justify-between ${admin.status === 'blocked' ? 'bg-red-50 border-red-100 opacity-60' : 'bg-white border-slate-100 shadow-sm'}`}>
                                                <div>
                                                    <div className="font-black text-sm text-slate-700">{admin.username}</div>
                                                    <div className="text-[9px] font-mono text-slate-400">PASS: {admin.password}</div>
                                                </div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('admins').doc(admin.id).update({ status: admin.status === 'active' ? 'blocked' : 'active' })} className={`p-1.5 rounded-lg transition-all ${admin.status === 'active' ? 'bg-amber-50 text-amber-500' : 'bg-green-50 text-green-500'}`}><Icon name={admin.status === 'active' ? 'slash' : 'check'} className="w-4 h-4" /></button>
                                                    <button onClick={() => {if(confirm('ลบ?')) db.collection('artifacts').doc(appId).collection('public').doc('data').collection('admins').doc(admin.id).delete()}} className="p-1.5 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 transition-all"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Project Modal */}
                    {isAddingProject && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in fade-in">
                            <form onSubmit={handleAddProject} className="bg-white w-full max-w-xl rounded-[40px] shadow-2xl p-10 space-y-8 animate-in zoom-in-95">
                                <h2 className="text-2xl font-black text-slate-800 flex items-center gap-3"><Icon name="plus-circle" className="text-indigo-600" /> เพิ่มโปรเจกต์ Cloud</h2>
                                <div className="space-y-4">
                                    <input type="text" value={inputUrl} onChange={e => setInputUrl(e.target.value)} placeholder="URL หน้าตอบคำถาม (/viewform)" className="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl outline-none font-bold" required />
                                    <textarea value={inputHtml} onChange={e => setInputHtml(e.target.value)} placeholder="วาง HTML Source Code (Ctrl+U)..." className="w-full h-40 px-5 py-4 bg-slate-50 border-none rounded-2xl outline-none font-mono text-[10px] resize-none" required />
                                </div>
                                <div className="flex gap-3">
                                    <button type="button" onClick={() => setIsAddingProject(false)} className="flex-1 bg-slate-100 text-slate-500 font-black py-4 rounded-2xl">ยกเลิก</button>
                                    <button type="submit" className="flex-[2] bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-indigo-700">สร้างโปรเจกต์ใหม่</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* View Details Modal */}
                    {selectedTask && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay animate-in fade-in" onClick={() => setSelectedTask(null)}>
                            <div className="bg-white w-full max-w-md rounded-[40px] shadow-2xl p-10 space-y-6" onClick={e => e.stopPropagation()}>
                                <h2 className="text-xl font-black border-b pb-4">{selectedTask.taskName}</h2>
                                <div className="space-y-3 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                                    {projects.find(p => p.id === selectedTask.projectId)?.fields.map((f, i) => (
                                        <div key={i} className="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                                            <div className="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">{f.label}</div>
                                            <div className="text-sm font-bold text-slate-700">{selectedTask.data[f.entryId] || '(ว่าง)'}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="text-[9px] text-center text-slate-300 font-bold uppercase tracking-widest pt-4">บันทึกโดย {selectedTask.createdBy}</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
