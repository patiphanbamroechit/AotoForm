<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form Submitter Pro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Simple SVG Icons using Lucide names as reference
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [url, setUrl] = useState('');
            const [rawHtml, setRawHtml] = useState('');
            const [formData, setFormData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const [scheduleTime, setScheduleTime] = useState('');
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [timeLeft, setTimeLeft] = useState(null);
            const timerRef = useRef(null);

            const extractFormDetails = (htmlText) => {
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');
                    const scripts = Array.from(doc.querySelectorAll('script'));
                    const scriptWithData = scripts.find(s => s.innerText.includes('FB_PUBLIC_LOAD_DATA_'));
                    
                    let detectedFields = [];

                    if (scriptWithData) {
                        const regex = /FB_PUBLIC_LOAD_DATA_ = (.*?);/s;
                        const match = scriptWithData.innerText.match(regex);
                        if (match) {
                            try {
                                const data = JSON.parse(match[1]);
                                const items = data[1][1];
                                detectedFields = items.map(item => ({
                                    id: item[0],
                                    label: item[1],
                                    entryId: item[4] ? `entry.${item[4][0][0]}` : null,
                                    value: ''
                                })).filter(f => f.entryId);
                            } catch (e) { console.error("JSON Parse failed", e); }
                        }
                    }

                    if (detectedFields.length === 0) {
                        const inputs = doc.querySelectorAll('input[name^="entry."]');
                        const processedNames = new Set();
                        inputs.forEach(input => {
                            const name = input.getAttribute('name');
                            if (!processedNames.has(name)) {
                                let label = "คำถามที่ไม่ระบุชื่อ";
                                const container = input.closest('div[role="listitem"]') || input.parentElement;
                                const labelEl = container?.querySelector('div[role="heading"]') || container?.querySelector('span');
                                if (labelEl) label = labelEl.innerText.trim();
                                detectedFields.push({ id: Math.random(), label, entryId: name, value: '' });
                                processedNames.add(name);
                            }
                        });
                    }

                    if (detectedFields.length === 0) {
                        throw new Error('ไม่พบช่องกรอกข้อมูล กรุณาตรวจสอบว่าวางโค้ดจากหน้า "View Form" (Ctrl+U)');
                    }
                    setFormData(detectedFields);
                    setError(null);
                } catch (err) {
                    setError(err.message);
                    setFormData([]);
                }
            };

            const submitForm = async () => {
                if (!url || !url.includes('docs.google.com/forms')) {
                    alert('URL ไม่ถูกต้อง');
                    return;
                }
                const responseUrl = url.replace('/viewform', '/formResponse');
                const formBody = new URLSearchParams();
                formData.forEach(field => formBody.append(field.entryId, field.value));

                try {
                    setLoading(true);
                    await fetch(responseUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formBody.toString()
                    });
                    alert('ส่งข้อมูลสำเร็จ!');
                    setIsTimerRunning(false);
                } catch (err) {
                    alert('Error: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (isTimerRunning && timeLeft > 0) {
                    timerRef.current = setTimeout(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (isTimerRunning && timeLeft === 0) {
                    submitForm();
                }
                return () => clearTimeout(timerRef.current);
            }, [isTimerRunning, timeLeft]);

            const startSchedule = () => {
                if (!scheduleTime) return alert('เลือกเวลาส่งก่อน');
                const now = new Date();
                const [h, m] = scheduleTime.split(':');
                const target = new Date();
                target.setHours(h, m, 0);
                if (target < now) target.setDate(target.getDate() + 1);
                setTimeLeft(Math.floor((target - now) / 1000));
                setIsTimerRunning(true);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="text-center mb-10">
                            <div className="inline-flex items-center justify-center p-4 bg-indigo-600 rounded-3xl mb-4 shadow-xl shadow-indigo-200">
                                <Icon name="send" className="text-white w-8 h-8" />
                            </div>
                            <h1 className="text-3xl font-bold text-slate-800">Google Form Submitter Pro</h1>
                            <p className="text-slate-500 mt-2">วิเคราะห์โค้ด สกัด Entry ID และตั้งเวลาส่งฟอร์มอัตโนมัติ</p>
                        </header>

                        <section className="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 mb-8">
                            <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                <Icon name="search" className="text-indigo-600" /> 1. ข้อมูลพื้นฐาน
                            </h2>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-sm font-medium block mb-1">URL ฟอร์มหน้าตอบคำถาม:</label>
                                    <input type="text" value={url} onChange={e => setUrl(e.target.value)} placeholder="https://docs.google.com/forms/d/e/.../viewform" className="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" />
                                </div>
                                <div className="grid md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-sm font-medium block mb-1">HTML Source Code (Ctrl+U):</label>
                                        <textarea value={rawHtml} onChange={e => setRawHtml(e.target.value)} placeholder="วางโค้ด HTML ทั้งหมดที่นี่..." className="w-full h-40 px-4 py-3 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-[10px] resize-none" />
                                    </div>
                                    <div className="bg-indigo-50 p-5 rounded-2xl flex flex-col justify-between">
                                        <div className="text-xs text-indigo-800 space-y-2">
                                            <p className="font-bold text-sm">💡 ขั้นตอนการดึง Entry ID:</p>
                                            <p>1. ไปหน้า Google Form ที่จะส่ง</p>
                                            <p>2. กด <b>Ctrl+U</b> เพื่อเปิด Source Code</p>
                                            <p>3. <b>Ctrl+A</b> และ <b>Ctrl+C</b> มาวางที่นี่</p>
                                        </div>
                                        <button onClick={() => extractFormDetails(rawHtml)} className="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                                            วิเคราะห์ฟอร์ม
                                        </button>
                                    </div>
                                </div>
                            </div>
                            {error && <div className="mt-4 p-4 bg-red-50 text-red-700 rounded-2xl text-sm flex gap-2"><Icon name="alert-circle" /> {error}</div>}
                        </section>

                        {formData.length > 0 && (
                            <div className="grid lg:grid-cols-3 gap-8">
                                <section className="lg:col-span-2 bg-white rounded-3xl shadow-xl border border-slate-100 p-6">
                                    <h2 className="text-lg font-bold mb-6 flex items-center gap-2 border-b pb-4"><Icon name="list" className="text-indigo-600" /> 2. กรอกข้อมูล</h2>
                                    <div className="space-y-6">
                                        {formData.map((field, idx) => (
                                            <div key={idx} className="space-y-1">
                                                <div className="flex justify-between items-end">
                                                    <label className="text-sm font-semibold text-slate-700">{field.label}</label>
                                                    <code className="text-[10px] text-slate-400">{field.entryId}</code>
                                                </div>
                                                <input type="text" value={field.value} onChange={e => {
                                                    const n = [...formData];
                                                    n[idx].value = e.target.value;
                                                    setFormData(n);
                                                }} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="space-y-6">
                                    <div className="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 sticky top-8">
                                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Icon name="clock" className="text-indigo-600" /> 3. ส่งข้อมูล</h2>
                                        <div className="space-y-4">
                                            <input type="time" value={scheduleTime} onChange={e => setScheduleTime(e.target.value)} disabled={isTimerRunning} className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" />
                                            {!isTimerRunning ? (
                                                <button onClick={startSchedule} className="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-amber-100 flex items-center justify-center gap-2">
                                                    <Icon name="timer" /> ตั้งเวลาส่ง
                                                </button>
                                            ) : (
                                                <div className="bg-amber-50 p-4 rounded-2xl text-center border border-amber-100">
                                                    <p className="text-xs text-amber-700 font-bold uppercase mb-1">จะส่งในอีก...</p>
                                                    <p className="text-2xl font-black text-amber-600 mb-3">{Math.floor(timeLeft/60)}น. {timeLeft%60}ว.</p>
                                                    <button onClick={() => setIsTimerRunning(false)} className="text-xs text-amber-700 hover:underline">ยกเลิก</button>
                                                </div>
                                            )}
                                            <div className="relative py-2 text-center text-[10px] text-slate-300 font-bold uppercase tracking-widest">หรือ</div>
                                            <button onClick={submitForm} disabled={loading} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                                                {loading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <Icon name="play" />} ส่งตอนนี้เลย
                                            </button>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}

                        {formData.length === 0 && (
                            <div className="py-20 bg-white rounded-[32px] border-2 border-dashed border-slate-200 text-center">
                                <Icon name="file-text" className="w-12 h-12 text-slate-200 mx-auto mb-4" />
                                <p className="text-slate-400">กรุณาวาง Source Code และวิเคราะห์ฟอร์มเพื่อเริ่มต้น</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
